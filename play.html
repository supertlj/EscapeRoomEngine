<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Escape Room Engine - Play</title>
<link rel="stylesheet" href="css/shared.css">
<link rel="stylesheet" href="css/play.css">
</head>
<body>
<div class="game-container" id="gameContainer">
  <div class="game-topbar">
    <span class="room-name" id="roomName">Loading...</span>
    <span class="timer" id="timer">--:--</span>
    <button class="hint-btn" id="hintBtn">HINT</button>
  </div>
  <div class="canvas-wrapper">
    <canvas id="gameCanvas"></canvas>
    <div class="canvas-vignette"></div>
    <div class="canvas-ambient"></div>
  </div>
  <!-- Inventory, Zoom, Dialogs, FX inserted dynamically -->
</div>

<!-- Debug overlay -->
<div class="debug-info hidden" id="debugInfo"></div>

<script type="module">
import EventBus from './js/core/EventBus.js';
import { Room } from './js/core/RoomData.js';
import { validateRoom } from './js/core/SchemaValidator.js';
import StateManager from './js/core/StateManager.js';
import {
  buildIndex,
  resolveRoomPath,
  resolveChapterAssetPath,
  getChapterForRoom,
  getChapter,
  getAllChapters,
  RoomNotFoundError,
  ChapterIndexLoadError,
  ChapterManifestParseError
} from './js/core/ChapterIndex.js';
import Renderer from './js/engine/Renderer.js';
import InputHandler from './js/engine/InputHandler.js';
import GameLoop from './js/engine/GameLoop.js';
import PuzzleRunner from './js/game/PuzzleRunner.js';
import DialogUI from './js/game/DialogUI.js';
import InventoryUI from './js/game/InventoryUI.js';
import HintSystem from './js/game/HintSystem.js';
import RoomManager from './js/game/RoomManager.js';
import AssetManager from './js/editor/AssetManager.js';
import ZoomViewUI from './js/game/ZoomViewUI.js';
import VisualFX from './js/game/VisualFX.js';
import EndScreen from './js/game/EndScreen.js';
import CinematicPlayer from './js/game/CinematicPlayer.js';

// Debug mode
const params = new URLSearchParams(location.search.length > 1 ? location.search : location.hash.replace('#', '?'));
if (params.get('debug') === '1') window.DEBUG = true;
const debugEl = document.getElementById('debugInfo');
if (window.DEBUG) debugEl.classList.remove('hidden');

// DOM
const canvas = document.getElementById('gameCanvas');
const container = document.getElementById('gameContainer');
const roomNameEl = document.getElementById('roomName');
const timerEl = document.getElementById('timer');
const hintBtn = document.getElementById('hintBtn');

// --- Load Room ---
async function loadRoom() {
  const roomParam = params.get('room') || 'apartment';
  let data;
  if (roomParam === 'imported') {
    const raw = localStorage.getItem('ere_imported_room');
    if (!raw) throw new Error('No imported room found');
    data = JSON.parse(raw);
  } else {
    // Resolve via ChapterIndex (chapter-folder layout)
    const path = resolveRoomPath(roomParam);
    const resp = await fetch(path);
    if (!resp.ok) throw new Error(`Failed to load room: ${roomParam}`);
    data = await resp.json();
  }
  const validation = validateRoom(data);
  if (!validation.valid) console.warn('Room validation:', validation.errors);
  return Room.fromJSON(data);
}

// --- Boot ---
async function init() {
  const roomParam = params.get('room') || 'apartment';

  // Build chapter index first — must precede any room load.
  try {
    await buildIndex();
  } catch (err) {
    roomNameEl.textContent = 'Error';
    const msg = err instanceof ChapterIndexLoadError
      ? 'Site is loading. Please refresh in a moment.'
      : err instanceof ChapterManifestParseError
        ? 'Game data is malformed. Please refresh; if this persists, contact the developer.'
        : err.message;
    document.body.innerHTML += `<div class="message-overlay"><div class="message-box"><p>${msg}</p><button class="dismiss" onclick="location.reload()">Refresh</button></div></div>`;
    console.error('ChapterIndex boot failed:', err);
    return;
  }

  let room;
  try {
    room = await loadRoom();
  } catch (err) {
    roomNameEl.textContent = 'Error';
    const msg = err instanceof RoomNotFoundError
      ? `This room isn't ready yet: ${err.roomId}`
      : err.message;
    document.body.innerHTML += `<div class="message-overlay"><div class="message-box"><p>${msg}</p><a href="index.html"><button class="dismiss">Back</button></a></div></div>`;
    return;
  }

  // Preload images (background + hotspot images)
  const assetManager = new AssetManager();
  await assetManager.preloadRoom(room);

  // State — keyed by game id, not per-room. Try to load existing save.
  const state = new StateManager();
  try {
    const loaded = state.load();
    if (!loaded) {
      // No save yet — first-time player. Initialize with the URL room
      // and write the save immediately so returning visitors see "Continue".
      state.currentRoomId = roomParam;
      const ch = (await import('./js/core/ChapterIndex.js')).getChapterForRoom(roomParam);
      if (ch) state.setCurrentChapter(ch.id);
      try { state.save(); } catch (e) { console.warn('Initial save failed:', e); }
    }
  } catch (err) {
    // Corrupt or version-ahead save. Show recovery dialog.
    console.error('Save load failed:', err);
    const isVersionAhead = err.name === 'SaveVersionAheadError';
    const msg = isVersionAhead
      ? 'Your save is from a newer version of the game. Please refresh.'
      : 'Your save data is corrupt. Reset it to continue (your progress will be lost).';
    const buttons = isVersionAhead
      ? `<button class="dismiss" onclick="location.reload()">Refresh</button>`
      : `<button class="dismiss" onclick="localStorage.removeItem('ere_save_cipher-1892'); location.reload()">Reset Save Data</button>
         <a href="index.html"><button class="dismiss" style="margin-left:8px">Back</button></a>`;
    document.body.innerHTML += `<div class="message-overlay"><div class="message-box"><p>${msg}</p>${buttons}</div></div>`;
    return;
  }

  // --- Intro cinematic gate ---
  // Show the chapter intro on first play. URL ?skipIntro=1 always bypasses
  // (used for tests + dev). After watching once, settings.introSeen=true so
  // returning players don't sit through it again.
  const skipIntroParam = params.get('skipIntro') === '1';
  const ch = getChapterForRoom(roomParam);
  const isStartRoom = ch && ch.rooms?.find(r => r.id === roomParam)?.isStartRoom;
  const introSeen = state.settings?.introSeen === true;
  const shouldShowIntro = !skipIntroParam && isStartRoom && ch?.intro?.asset && !introSeen;

  if (shouldShowIntro) {
    try {
      const introPath = resolveChapterAssetPath(ch.id, ch.intro.asset);
      const introResp = await fetch(introPath);
      if (introResp.ok) {
        const introScript = await introResp.json();
        await new Promise((resolve) => {
          const player = new CinematicPlayer(document.body, {
            onComplete: () => {
              state.setSetting('introSeen', true);
              try { state.save(); } catch {}
              resolve();
            },
            onSkip: () => {
              state.setSetting('introSeen', true);
              try { state.save(); } catch {}
              resolve();
            },
            resolveAsset: (rel) => resolveChapterAssetPath(ch.id, rel)
          });
          player.play(introScript);
        });
      }
    } catch (introErr) {
      // Cinematic is non-blocking — if it fails, log and continue.
      console.warn('Intro cinematic failed to load, skipping:', introErr);
    }
  }

  // Timer setting (from room-set or room, default 30 min)
  const timerSeconds = room.settings?.timerSeconds || 1800;

  // Renderer
  const renderer = new Renderer(canvas);
  renderer.setRoom(room, state.hotspotVisibility);

  // Input
  const input = new InputHandler(canvas, renderer);
  input.setRoom(room, state.hotspotVisibility);

  // PuzzleRunner
  const puzzleRunner = new PuzzleRunner(state, room);

  // DialogUI
  const dialogUI = new DialogUI(container);

  // InventoryUI
  const inventoryUI = new InventoryUI(container, state, room);

  // ZoomViewUI
  const zoomViewUI = new ZoomViewUI(container, state);
  zoomViewUI.setInventoryUI(inventoryUI);

  // VisualFX
  const visualFX = new VisualFX(container);

  // GameLoop (timer)
  const gameLoop = new GameLoop(state);

  // HintSystem
  const hintSystem = new HintSystem(state, room.hints);

  // RoomManager
  const roomManager = new RoomManager(state, {
    onRoomLoaded: (newRoom) => {
      roomNameEl.textContent = newRoom.name;
      renderer.setRoom(newRoom, state.hotspotVisibility);
      input.setRoom(newRoom, state.hotspotVisibility);
      puzzleRunner.setRoom(newRoom);
      inventoryUI.setRoom(newRoom);
      hintSystem.setHints(newRoom.hints);
      renderer.markDirty();
    }
  });
  roomManager.registerRoom(room);

  // --- Update UI ---
  roomNameEl.textContent = room.name;

  function updateHintButton() {
    const remaining = hintSystem.getHintsRemaining();
    hintBtn.textContent = `HINT (${remaining})`;
  }
  updateHintButton();

  // --- Event Wiring ---

  // Timer display
  EventBus.on('timer:update', ({ remaining }) => {
    timerEl.textContent = GameLoop.formatTime(remaining);
  });

  // Hint button
  hintBtn.addEventListener('click', () => {
    hintSystem.requestHint();
    updateHintButton();
  });

  EventBus.on('hint:used', () => updateHintButton());

  // Visual hint — pulse a red circle around the target hotspot on the canvas
  EventBus.on('hint:show', ({ hotspotId }) => {
    renderer.pulseHint(hotspotId);
  });

  // Puzzle data requests from DialogUI
  EventBus.on('puzzle:requestData', ({ puzzleId, callback }) => {
    const rm = roomManager.currentRoom || room;
    callback(rm.getPuzzle(puzzleId));
  });

  // Room enter actions
  EventBus.on('room:enterActions', ({ actions }) => {
    puzzleRunner.executeActions(actions);
  });

  // Zoom sub-hotspot actions → route through PuzzleRunner
  EventBus.on('zoom:executeActions', ({ actions }) => {
    puzzleRunner.executeActions(actions);
  });

  // FX on item pickup
  EventBus.on('action:giveItem', () => {
    EventBus.emit('fx:flash', { color: 'rgba(255,220,100,0.15)' });
  });

  // Hotspot tap -> zoom check first, then pattern, then PuzzleRunner
  EventBus.on('hotspot:tap', ({ hotspot }) => {
    // If zoom is open, ignore canvas taps
    if (zoomViewUI.isOpen()) return;

    // If a pattern puzzle is active, route taps to it
    if (puzzleRunner.isPatternActive()) {
      puzzleRunner.handlePatternTap(hotspot.id);
      return;
    }

    // If hotspot has a zoomView, open zoom — unless a selected item matches a top-level useItem trigger
    if (hotspot.zoomView) {
      const selId = inventoryUI.getSelectedItemId();
      const hasTopUseItem = selId && hotspot.triggers.some(t =>
        t.type === 'useItem' && (!t.requiredItem || t.requiredItem === selId));
      if (!hasTopUseItem) {
        EventBus.emit('action:openZoom', { hotspot });
        return;
      }
    }

    const selectedItemId = inventoryUI.getSelectedItemId();
    const handled = puzzleRunner.handleHotspotTap(hotspot, selectedItemId);

    if (handled && selectedItemId) {
      inventoryUI.clearSelection();
    }

    if (window.DEBUG) {
      debugEl.textContent = `Tap: ${hotspot.id} | Item: ${selectedItemId || '-'} | OK: ${handled}`;
    }
  });

  // Tap empty space -> deselect
  EventBus.on('input:tap', ({ hotspot }) => {
    if (!hotspot && inventoryUI.getSelectedItemId()) {
      inventoryUI.clearSelection();
    }
  });

  // Item combining
  EventBus.on('inventory:combine', ({ itemA, itemB }) => {
    const rm = roomManager.currentRoom || room;
    const a = rm.getItem(itemA);
    const b = rm.getItem(itemB);
    if (a && b) {
      const combined = puzzleRunner.handleCombine(a, b);
      if (!combined) {
        EventBus.emit('action:showMessage', {
          message: "These items don't combine.",
          onDismiss: () => {}
        });
      }
    }
  });

  // State changes -> re-render
  EventBus.on('state:visibilityChanged', () => {
    renderer.setVisibilityOverrides(state.hotspotVisibility);
    input.setVisibilityOverrides(state.hotspotVisibility);
  });
  EventBus.on('state:flagChanged', () => renderer.markDirty());

  // Auto-save after action chains complete
  EventBus.on('puzzle:actionsComplete', () => {
    state.save();
    if (window.DEBUG) console.log('[auto-save]');
  });

  // End screen — used by chapter completion flow.
  const endScreen = new EndScreen(document.body, {
    onReplay: () => {
      // Replay this chapter: clear save and reload the start room.
      const ch = getChapterForRoom(state.currentRoomId);
      if (ch) {
        const startRoom = ch.rooms?.find(r => r.isStartRoom);
        // Soft-reset chapter-local state, keep choices/global flags.
        state.chapterFlags[ch.id] = {};
        state.completedRooms = state.completedRooms.filter(r => !ch.rooms?.some(cr => cr.id === r));
        state.completedChapters = state.completedChapters.filter(c => c !== ch.id);
        state.currentRoomId = startRoom ? startRoom.id : state.currentRoomId;
        try { state.save(); } catch {}
      }
      location.reload();
    },
    onBackToHub: () => { window.location.href = 'index.html'; }
  });

  // Win -> stop timer + chapter completion check
  EventBus.on('action:gameWin', () => {
    gameLoop.stop();
    // Mark current room complete
    state.markRoomComplete(state.currentRoomId);
    // Check if this room is the chapter's end room
    const ch = getChapterForRoom(state.currentRoomId);
    if (ch && ch.completion && ch.completion.trigger === 'endRoomComplete') {
      const endRoomId = ch.completion.endRoomId;
      if (state.currentRoomId === endRoomId) {
        state.markChapterComplete(ch.id);
        try { state.save(); } catch {}
        // Find next chapter for the teaser
        const all = getAllChapters();
        const next = all.find(c => c._indexOrder === ch._indexOrder + 1) || null;
        endScreen.show(ch, next);
        return;
      }
    }
    try { state.save(); } catch {}
  });

  // Lose -> already stopped by GameLoop
  EventBus.on('action:gameLose', () => {
    try { state.save(); } catch {}
  });

  // Debug: trigger end screen manually via console.
  if (window.DEBUG) {
    window._cipher = window._cipher || {};
    window._cipher.showEndScreen = () => {
      const ch = getChapterForRoom(state.currentRoomId);
      const all = getAllChapters();
      const next = ch ? all.find(c => c._indexOrder === ch._indexOrder + 1) : null;
      endScreen.show(ch, next);
    };
    console.log('[debug] _cipher.showEndScreen() available');
  }

  // Long-press inspect
  EventBus.on('input:longpress', ({ hotspot }) => {
    if (hotspot) {
      EventBus.emit('action:showMessage', {
        message: `${hotspot.label}\nID: ${hotspot.id}\nTriggers: ${hotspot.triggers.length}`,
        onDismiss: () => {}
      });
    }
  });

  // --- Start ---
  gameLoop.start(timerSeconds);

  // onEnter actions
  if (room.onEnter && room.onEnter.length > 0) {
    puzzleRunner.executeActions(room.onEnter);
  }

  // --- Debug ---
  if (window.DEBUG) {
    window._room = room;
    window._state = state;
    window._renderer = renderer;
    window._puzzleRunner = puzzleRunner;
    window._gameLoop = gameLoop;
    window._hintSystem = hintSystem;
    window._EventBus = EventBus;
    console.log('[DEBUG] Room:', room.id, '| Hotspots:', room.hotspots.length, '| Timer:', timerSeconds + 's');
  }
}

init();
</script>
</body>
</html>
