<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cipher 1892</title>
<link rel="stylesheet" href="css/shared.css">
<style>
  .home {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 60px 20px 40px;
    text-align: center;
    max-width: 520px;
    margin: 0 auto;
  }
  .home h1 {
    font-size: 36px;
    color: var(--gold);
    letter-spacing: 4px;
    margin-bottom: 4px;
    font-weight: 700;
  }
  .home .subtitle {
    color: var(--text-dim);
    font-size: 13px;
    letter-spacing: 2px;
    margin-bottom: 32px;
    text-transform: uppercase;
  }

  .continue-card {
    width: 100%;
    max-width: 360px;
    padding: 14px 16px;
    margin-bottom: 16px;
    background: rgba(196, 163, 90, 0.08);
    border: 1px solid var(--gold);
    border-radius: 8px;
    text-align: left;
  }
  .continue-card .continue-meta {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--gold);
    opacity: 0.8;
    margin-bottom: 4px;
  }
  .continue-card .continue-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }
  .continue-card .continue-room {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .hub-actions {
    width: 100%;
    max-width: 360px;
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
  }
  .hub-actions .menu-btn { flex: 1; margin-bottom: 0; }
  .hub-actions .menu-btn.primary {
    background: var(--gold);
    color: var(--bg-deep);
    border: 1px solid var(--gold);
    font-weight: 700;
  }

  .menu-btn {
    display: block;
    width: 100%;
    padding: 14px;
    margin-bottom: 8px;
    background: rgba(196, 163, 90, 0.1);
    border: 1px solid var(--gold);
    color: var(--gold);
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    min-height: var(--touch-min);
    cursor: pointer;
  }
  .menu-btn.secondary {
    border-color: var(--border);
    color: var(--text-dim);
    background: transparent;
    font-size: 12px;
    padding: 10px 12px;
  }
  .menu-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .hub-section-label {
    width: 100%;
    max-width: 360px;
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin: 8px 0 8px;
  }

  .room-list {
    width: 100%;
    max-width: 360px;
    text-align: left;
    margin-bottom: 24px;
  }
  .room-card {
    padding: 12px 14px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 6px;
  }
  .room-card.disabled { opacity: 0.55; }
  .room-card .name { font-size: 14px; font-weight: 500; color: var(--text); }
  .room-card .meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  .badge {
    display: inline-block;
    padding: 2px 6px;
    margin-left: 6px;
    font-size: 9px;
    border-radius: 3px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    vertical-align: 1px;
  }
  .badge.complete  { background: rgba(80, 200, 120, 0.18); color: #7fdca0; }
  .badge.released  { background: rgba(196, 163, 90, 0.18); color: var(--gold); }
  .badge.soon      { background: rgba(160, 160, 160, 0.15); color: #aaa; }

  .hub-footer {
    width: 100%;
    max-width: 360px;
    margin-top: 12px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .hub-footer .menu-btn { margin-bottom: 0; }
  .hub-footer label.menu-btn input[type="file"] { display: none; }

  /* Language picker — label + select inline */
  .hub-language {
    display: flex !important;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }
  .hub-language-label {
    flex: 0 0 auto;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
  }
  .hub-language-select {
    flex: 1 1 auto;
    background: transparent;
    color: var(--gold);
    border: none;
    font: inherit;
    font-size: 12px;
    cursor: pointer;
    padding: 2px 0;
    text-align: right;
  }
  .hub-language-select:focus { outline: none; }
  .hub-language-select option {
    background: var(--bg-deep);
    color: var(--text);
  }
</style>
</head>
<body>
<!-- Landscape-only: rotate prompt for portrait phones/tablets -->
<div class="rotate-prompt" role="dialog" aria-label="Rotate device">
  <svg class="rotate-prompt-icon" viewBox="0 0 92 92" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <rect x="14" y="6" width="64" height="80" rx="8"/>
    <line x1="14" y1="20" x2="78" y2="20"/>
    <line x1="14" y1="72" x2="78" y2="72"/>
    <circle cx="46" cy="79" r="2"/>
  </svg>
  <h2>Rotate to Landscape</h2>
  <p>Cipher 1892 plays in landscape mode. Turn your device sideways to continue.</p>
</div>

<div id="hubRoot">
  <div class="home">
    <h1>CIPHER 1892</h1>
    <p class="subtitle">Loading…</p>
  </div>
</div>

<script type="module">
  import { buildIndex, ChapterIndexLoadError, ChapterManifestParseError } from './js/core/ChapterIndex.js';
  import { buildLocale, t } from './js/core/I18n.js';
  import HubUI from './js/game/HubUI.js';

  const root = document.getElementById('hubRoot');

  async function boot() {
    // Load i18n FIRST so any error UI can be localized too.
    try {
      const savedLocale = (() => {
        try {
          const raw = localStorage.getItem('ere_save_cipher-1892');
          return raw ? JSON.parse(raw)?.settings?.locale : null;
        } catch { return null; }
      })();
      await buildLocale(savedLocale);
      // Static rotate-prompt + page title pull from i18n now that it's loaded.
      const rp = document.querySelector('.rotate-prompt');
      if (rp) {
        rp.querySelector('h2').textContent = t('rotatePrompt.title');
        rp.querySelector('p').textContent  = t('rotatePrompt.body');
      }
      document.title = t('game.title');
    } catch (err) {
      console.warn('I18n boot failed; English fallback in effect:', err);
    }

    try {
      await buildIndex();
    } catch (err) {
      const msg = err instanceof ChapterIndexLoadError
        ? t('boot.errorIndexLoad')
        : err instanceof ChapterManifestParseError
          ? t('boot.errorManifestParse')
          : err.message;
      root.innerHTML = `<div class="home"><h1>${t('game.title')}</h1><p class="subtitle">${t('common.error')}</p><p style="color:var(--text-dim); margin: 16px 0 24px; max-width: 360px;">${msg}</p><button class="menu-btn primary" onclick="location.reload()" style="max-width: 200px;">${t('common.refresh')}</button></div>`;
      console.error('Hub boot failed:', err);
      return;
    }

    const hub = new HubUI(root, {
      onPlay: () => {
        // Continue from saved room, or start at chapter's start room
        const raw = localStorage.getItem('ere_save_cipher-1892');
        if (raw) {
          try {
            const save = JSON.parse(raw);
            window.location.href = `play.html#room=${save.currentRoomId || 'apartment'}`;
            return;
          } catch {}
        }
        window.location.href = 'play.html#room=apartment';
      },
      onNewGame: () => {
        localStorage.removeItem('ere_save_cipher-1892');
        window.location.href = 'play.html#room=apartment';
      }
    });
    hub.render();
  }

  boot();
</script>
</body>
</html>
