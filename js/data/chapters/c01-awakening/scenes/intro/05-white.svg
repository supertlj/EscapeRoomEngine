<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="whiteCore" cx="50%" cy="50%" r="55%">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#f4f0e0"/>
      <stop offset="100%" stop-color="#d8c896"/>
    </radialGradient>
    <radialGradient id="whiteEdge" cx="50%" cy="50%" r="80%">
      <stop offset="60%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="100%" stop-color="rgba(80,60,30,0.45)"/>
    </radialGradient>
  </defs>

  <!-- Bright white-out -->
  <rect width="1280" height="720" fill="url(#whiteCore)"/>

  <!-- Subtle grain / blur lines suggesting overexposure -->
  <g opacity="0.18">
    <line x1="0" y1="180" x2="1280" y2="180" stroke="#fff8e0" stroke-width="40"/>
    <line x1="0" y1="380" x2="1280" y2="380" stroke="#fff8e0" stroke-width="60"/>
    <line x1="0" y1="540" x2="1280" y2="540" stroke="#fff8e0" stroke-width="30"/>
  </g>

  <!-- Faint chromatic aberration ring suggesting eye-opening -->
  <g fill="none" opacity="0.18">
    <ellipse cx="640" cy="360" rx="380" ry="240" stroke="#f0c890" stroke-width="6"/>
    <ellipse cx="640" cy="360" rx="320" ry="200" stroke="#fff4d8" stroke-width="3"/>
  </g>

  <!-- Edge fall-off -->
  <rect width="1280" height="720" fill="url(#whiteEdge)"/>
</svg>
