<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="glassBg" cx="50%" cy="55%" r="70%">
      <stop offset="0%"  stop-color="#10141c"/>
      <stop offset="100%" stop-color="#020308"/>
    </radialGradient>
    <linearGradient id="glassBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="rgba(220,235,250,0.18)"/>
      <stop offset="50%" stop-color="rgba(180,210,230,0.10)"/>
      <stop offset="100%" stop-color="rgba(120,150,180,0.18)"/>
    </linearGradient>
    <linearGradient id="glassWater" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="rgba(150,200,235,0.65)"/>
      <stop offset="100%" stop-color="rgba(60,100,150,0.85)"/>
    </linearGradient>
    <radialGradient id="glassRim" cx="50%" cy="50%" r="55%">
      <stop offset="0%"  stop-color="rgba(255,255,255,0)"/>
      <stop offset="80%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.2)"/>
    </radialGradient>
    <linearGradient id="handSkin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#5a3828"/>
      <stop offset="100%" stop-color="#2a1810"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#glassBg)"/>

  <!-- Counter top reflection -->
  <ellipse cx="640" cy="690" rx="500" ry="20" fill="rgba(180,200,220,0.06)"/>

  <!-- Glass of water — center -->
  <g transform="translate(640, 300)">
    <!-- Subtle floor reflection -->
    <ellipse cx="0" cy="380" rx="120" ry="14" fill="rgba(200,220,240,0.07)"/>

    <!-- Glass shape (slight taper) -->
    <path d="M-110,0 L110,0 L96,360 L-96,360 Z" fill="url(#glassBody)" stroke="rgba(220,240,255,0.4)" stroke-width="1.5"/>
    <!-- Water level inside -->
    <path d="M-104,80 L104,80 L94,360 L-94,360 Z" fill="url(#glassWater)" opacity="0.85"/>
    <!-- Top surface ellipse (water meniscus) -->
    <ellipse cx="0" cy="80" rx="104" ry="14" fill="rgba(120,170,210,0.6)"/>
    <ellipse cx="0" cy="80" rx="104" ry="14" fill="none" stroke="rgba(220,240,255,0.5)" stroke-width="1"/>
    <!-- Glass rim highlight -->
    <ellipse cx="0" cy="0" rx="110" ry="12" fill="none" stroke="rgba(240,250,255,0.85)" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="110" ry="12" fill="rgba(255,255,255,0.05)"/>
    <!-- Vertical highlight -->
    <path d="M-90,10 L-78,350" stroke="rgba(255,255,255,0.18)" stroke-width="3" fill="none"/>
    <!-- Refraction hint (specular at right) -->
    <path d="M86,30 L94,350" stroke="rgba(255,255,255,0.10)" stroke-width="2" fill="none"/>

    <!-- Suspicious sediment / dissolution wisp -->
    <g opacity="0.7">
      <ellipse cx="0" cy="200" rx="68" ry="12" fill="rgba(200,200,180,0.08)"/>
      <ellipse cx="-12" cy="220" rx="40" ry="6" fill="rgba(220,210,180,0.10)"/>
      <ellipse cx="14" cy="250" rx="56" ry="8" fill="rgba(220,210,180,0.06)"/>
      <ellipse cx="-4" cy="290" rx="48" ry="6" fill="rgba(240,230,200,0.05)"/>
    </g>

    <!-- Small bubbles rising -->
    <g fill="rgba(220,240,255,0.5)">
      <circle cx="-30" cy="320" r="2"/>
      <circle cx="-22" cy="270" r="1.4"/>
      <circle cx="40" cy="290" r="1.8"/>
      <circle cx="60" cy="200" r="1.4"/>
      <circle cx="-6" cy="160" r="2.2"/>
    </g>
    <ellipse cx="0" cy="0" rx="110" ry="12" fill="url(#glassRim)"/>
  </g>

  <!-- Hand reaching from below-right, blurred suggestion -->
  <g opacity="0.85">
    <path d="M820 720 L820 540 Q820 470 880 460 L1100 460 Q1180 460 1200 480 L1200 720 Z"
          fill="url(#handSkin)" opacity="0.9"/>
    <!-- Knuckles / finger separation -->
    <path d="M880 520 Q900 510 920 520" stroke="#1a0e08" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M940 506 Q960 496 980 504" stroke="#1a0e08" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M1000 498 Q1020 490 1040 498" stroke="#1a0e08" stroke-width="2" fill="none" opacity="0.5"/>
  </g>

  <!-- Dim warm rim light from screen left -->
  <radialGradient id="glassRimLight" cx="-10%" cy="50%" r="60%">
    <stop offset="0%"  stop-color="rgba(255,180,100,0.10)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
  </radialGradient>
  <rect width="1280" height="720" fill="url(#glassRimLight)"/>

  <!-- Vignette -->
  <radialGradient id="glassVig" cx="50%" cy="55%" r="78%">
    <stop offset="50%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.85)"/>
  </radialGradient>
  <rect width="1280" height="720" fill="url(#glassVig)"/>
</svg>
