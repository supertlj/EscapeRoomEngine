<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="nrLight" cx="35%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#3a2a16"/>
      <stop offset="100%" stop-color="#06040a"/>
    </radialGradient>
    <linearGradient id="nrLamp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fff4c8"/>
      <stop offset="100%" stop-color="#c89030"/>
    </linearGradient>
    <linearGradient id="nrDeskWood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#5a3818"/>
      <stop offset="100%" stop-color="#2a1a0a"/>
    </linearGradient>
    <radialGradient id="nrDeskHotspot" cx="40%" cy="40%" r="45%">
      <stop offset="0%"   stop-color="rgba(255,210,120,0.55)"/>
      <stop offset="60%"  stop-color="rgba(180,120,40,0.18)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <linearGradient id="nrPaper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#f6e8c8"/>
      <stop offset="100%" stop-color="#c8b078"/>
    </linearGradient>
    <linearGradient id="nrLaptop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#202028"/>
      <stop offset="100%" stop-color="#0a0a10"/>
    </linearGradient>
  </defs>

  <!-- Backdrop -->
  <rect width="1280" height="720" fill="url(#nrLight)"/>

  <!-- Distant newsroom silhouettes (other desks) -->
  <g opacity="0.25">
    <rect x="40"   y="430" width="170" height="60" fill="#1a1a22"/>
    <rect x="240"  y="450" width="170" height="55" fill="#15151c"/>
    <rect x="900"  y="445" width="180" height="60" fill="#1a1a22"/>
    <rect x="1110" y="455" width="140" height="50" fill="#15151c"/>
  </g>

  <!-- Faint ceiling fluorescents (cool counter-light) -->
  <g opacity="0.22">
    <rect x="80"   y="40" width="220" height="6" fill="#88a0c8"/>
    <rect x="540"  y="32" width="220" height="6" fill="#88a0c8"/>
    <rect x="980"  y="46" width="220" height="6" fill="#88a0c8"/>
  </g>

  <!-- Foreground desk -->
  <rect x="0" y="500" width="1280" height="220" fill="url(#nrDeskWood)"/>
  <rect x="0" y="498" width="1280" height="6" fill="#7a4a20" opacity="0.6"/>

  <!-- Desk warm light pool -->
  <ellipse cx="520" cy="540" rx="430" ry="180" fill="url(#nrDeskHotspot)"/>

  <!-- Desk lamp (left) -->
  <g transform="translate(170,360)">
    <rect x="-3" y="0"   width="6"  height="160" fill="#1a1410"/>
    <ellipse cx="0" cy="160" rx="42" ry="10" fill="#0e0a06"/>
    <path d="M-46,-30 Q0,-78 46,-30 L30,4 Q0,-12 -30,4 Z" fill="#3a2818" stroke="#1a0e04" stroke-width="2"/>
    <ellipse cx="0" cy="6" rx="32" ry="10" fill="url(#nrLamp)"/>
    <ellipse cx="0" cy="6" rx="20" ry="6" fill="#fff8e0"/>
  </g>
  <!-- Lamp glow -->
  <circle cx="170" cy="370" r="220" fill="rgba(255,200,120,0.07)"/>

  <!-- Laptop on desk -->
  <g transform="translate(720,520)">
    <polygon points="-110,0 110,0 102,52 -102,52" fill="#3a3a3a"/>
    <rect x="-46" y="50" width="92" height="3" fill="#1a1a1a"/>
    <polygon points="-118,-2 118,-2 110,-148 -110,-148" fill="url(#nrLaptop)" stroke="#1a1a1a" stroke-width="2"/>
    <polygon points="-100,-12 100,-12 94,-138 -94,-138" fill="#0c1a3a"/>
    <!-- Faint screen UI lines -->
    <g opacity="0.55">
      <rect x="-86" y="-128" width="172" height="3" fill="#8ec5ff"/>
      <rect x="-86" y="-118" width="120" height="2" fill="#8ec5ff" opacity="0.7"/>
      <rect x="-86" y="-110" width="160" height="2" fill="#8ec5ff" opacity="0.5"/>
      <rect x="-86" y="-102" width="96"  height="2" fill="#8ec5ff" opacity="0.6"/>
      <rect x="-86" y="-94"  width="140" height="2" fill="#8ec5ff" opacity="0.5"/>
      <rect x="-86" y="-86"  width="100" height="2" fill="#8ec5ff" opacity="0.5"/>
    </g>
  </g>
  <!-- Laptop screen glow -->
  <ellipse cx="720" cy="430" rx="200" ry="80" fill="rgba(140,200,255,0.06)"/>

  <!-- Stack of papers + pen -->
  <g transform="translate(420,548)">
    <rect x="-6" y="-3" width="146" height="50" rx="2" fill="url(#nrPaper)" transform="rotate(-3)"/>
    <rect x="0"  y="0"  width="140" height="48" rx="2" fill="url(#nrPaper)" stroke="#a07840" stroke-width="0.5"/>
    <line x1="14" y1="14" x2="120" y2="14" stroke="#1a1410" stroke-width="0.6" opacity="0.5"/>
    <line x1="14" y1="22" x2="100" y2="22" stroke="#1a1410" stroke-width="0.6" opacity="0.5"/>
    <line x1="14" y1="30" x2="115" y2="30" stroke="#1a1410" stroke-width="0.6" opacity="0.5"/>
    <line x1="14" y1="38" x2="80"  y2="38" stroke="#1a1410" stroke-width="0.6" opacity="0.5"/>
    <!-- Pen -->
    <rect x="138" y="22" width="60" height="3" fill="#1a1410" transform="rotate(18, 138, 22)"/>
  </g>

  <!-- Coffee mug -->
  <g transform="translate(940,530)">
    <ellipse cx="0" cy="42" rx="32" ry="8" fill="#1a1410"/>
    <rect x="-30" y="6" width="60" height="38" rx="3" fill="#3a2a18" stroke="#1a1208" stroke-width="1"/>
    <ellipse cx="0" cy="8" rx="29" ry="6" fill="#1a0a04"/>
    <ellipse cx="0" cy="6" rx="24" ry="4" fill="#2a1810"/>
    <path d="M30,12 Q50,18 50,28 Q50,38 30,38" fill="none" stroke="#3a2a18" stroke-width="5"/>
    <!-- Steam -->
    <g opacity="0.25" stroke="#f0e0c0" stroke-width="2" fill="none">
      <path d="M-8,2 Q-14,-12 -4,-22 Q4,-32 -2,-44"/>
      <path d="M8,2 Q14,-12 4,-22 Q-4,-32 2,-44"/>
    </g>
  </g>

  <!-- Vignette -->
  <radialGradient id="nrVig" cx="50%" cy="50%" r="80%">
    <stop offset="55%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.7)"/>
  </radialGradient>
  <rect width="1280" height="720" fill="url(#nrVig)"/>
</svg>
