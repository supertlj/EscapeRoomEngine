<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="idTable" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1a1410"/>
      <stop offset="100%" stop-color="#06040a"/>
    </linearGradient>
    <radialGradient id="idSpot" cx="50%" cy="50%" r="48%">
      <stop offset="0%"  stop-color="rgba(255,210,140,0.5)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <linearGradient id="idCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#f6efde"/>
      <stop offset="100%" stop-color="#d8c896"/>
    </linearGradient>
    <linearGradient id="idStripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#3a2010"/>
      <stop offset="100%" stop-color="#5a3010"/>
    </linearGradient>
    <radialGradient id="idPhotoBg" cx="50%" cy="35%" r="65%">
      <stop offset="0%"  stop-color="#7a8090"/>
      <stop offset="100%" stop-color="#3a4050"/>
    </radialGradient>
  </defs>

  <!-- Table background -->
  <rect width="1280" height="720" fill="url(#idTable)"/>
  <!-- Light pool -->
  <ellipse cx="640" cy="360" rx="500" ry="300" fill="url(#idSpot)"/>

  <!-- ID card (slight rotation) -->
  <g transform="translate(640, 360) rotate(-6) translate(-340, -200)">
    <!-- Drop shadow -->
    <rect x="14" y="14" width="680" height="400" rx="20" fill="rgba(0,0,0,0.55)"/>
    <!-- Card body -->
    <rect x="0" y="0" width="680" height="400" rx="18" fill="url(#idCard)" stroke="#988050" stroke-width="2"/>
    <!-- Top stripe -->
    <rect x="0" y="0" width="680" height="58" rx="18" fill="url(#idStripe)"/>
    <text x="32" y="38" fill="#e8d8a8" font-family="monospace" font-size="22" font-weight="700" letter-spacing="3">PRESS CREDENTIAL</text>
    <text x="555" y="38" fill="#e8d8a8" font-family="monospace" font-size="14" letter-spacing="2">VALID 2024</text>

    <!-- Photo block -->
    <rect x="36" y="92" width="220" height="270" rx="6" fill="url(#idPhotoBg)" stroke="#5a4830" stroke-width="2"/>
    <!-- Silhouette portrait -->
    <ellipse cx="146" cy="200" rx="56" ry="68" fill="#2a2a32"/>
    <path d="M70 360 Q70 280 146 280 Q222 280 222 360 Z" fill="#2a2a32"/>
    <rect x="36" y="320" width="220" height="42" fill="rgba(0,0,0,0.4)"/>

    <!-- Right side text fields -->
    <g font-family="monospace" fill="#3a2818">
      <text x="294" y="116" font-size="13" opacity="0.65" letter-spacing="2">NAME</text>
      <text x="294" y="146" font-size="28" font-weight="700">SAM REYES</text>

      <text x="294" y="194" font-size="13" opacity="0.65" letter-spacing="2">OUTLET</text>
      <text x="294" y="222" font-size="20" font-weight="600">THE LEDGER POST</text>

      <text x="294" y="270" font-size="13" opacity="0.65" letter-spacing="2">CLEARANCE</text>
      <text x="294" y="298" font-size="20" font-weight="600">A-3 / FIELD</text>

      <text x="294" y="346" font-size="13" opacity="0.65" letter-spacing="2">ID #</text>
      <text x="294" y="374" font-size="22" font-weight="700">SR-0042</text>
    </g>

    <!-- Hologram accent -->
    <g opacity="0.45">
      <circle cx="600" cy="320" r="34" fill="none" stroke="#88c8b0" stroke-width="2"/>
      <circle cx="600" cy="320" r="22" fill="none" stroke="#88c8b0" stroke-width="1"/>
      <circle cx="600" cy="320" r="10" fill="none" stroke="#88c8b0" stroke-width="1"/>
    </g>
  </g>

  <!-- Strong vignette -->
  <radialGradient id="idVig" cx="50%" cy="50%" r="70%">
    <stop offset="50%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.85)"/>
  </radialGradient>
  <rect width="1280" height="720" fill="url(#idVig)"/>
</svg>
