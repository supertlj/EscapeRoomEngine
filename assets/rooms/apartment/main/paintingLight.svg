<svg xmlns="http://www.w3.org/2000/svg" width="110" height="90">
  <defs>
    <linearGradient id="frameGold2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#efdca0"/>
      <stop offset="50%" stop-color="#c9a45a"/>
      <stop offset="100%" stop-color="#8a6624"/>
    </linearGradient>
    <linearGradient id="daySky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#c8e4f0"/>
      <stop offset="70%" stop-color="#f3d8aa"/>
      <stop offset="100%" stop-color="#e8b878"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#fff6d5" stop-opacity="1"/>
      <stop offset="60%" stop-color="#ffe4a8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffe4a8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="meadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8aa850"/>
      <stop offset="100%" stop-color="#5a7a30"/>
    </linearGradient>
  </defs>
  <!-- Frame drop shadow -->
  <rect x="4" y="4" width="104" height="84" rx="2" fill="rgba(0,0,0,0.22)"/>
  <!-- Outer gold frame -->
  <rect x="0" y="0" width="104" height="84" rx="2" fill="url(#frameGold2)"/>
  <!-- Inner bevel -->
  <rect x="3" y="3" width="98" height="78" fill="#8a6624"/>
  <!-- Canvas sky -->
  <rect x="6" y="6" width="92" height="72" fill="url(#daySky)"/>
  <!-- Sun halo -->
  <circle cx="34" cy="24" r="14" fill="url(#sun)"/>
  <circle cx="34" cy="24" r="5" fill="#fff6d5"/>
  <!-- Clouds -->
  <g fill="#ffffff" opacity="0.85">
    <ellipse cx="60" cy="22" rx="10" ry="3"/>
    <ellipse cx="66" cy="20" rx="6" ry="2.5"/>
    <ellipse cx="82" cy="30" rx="8" ry="2.5"/>
  </g>
  <!-- Distant hills -->
  <path d="M6 56 L22 48 L38 54 L56 46 L72 52 L86 48 L98 54 L98 78 L6 78 Z" fill="#6e8aa4"/>
  <path d="M6 62 L30 54 L48 58 L68 52 L88 56 L98 60 L98 78 L6 78 Z" fill="#88a4b8" opacity="0.7"/>
  <!-- Meadow -->
  <path d="M6 66 L98 62 L98 78 L6 78 Z" fill="url(#meadow)"/>
  <!-- Winding path -->
  <path d="M50 78 Q56 74 54 68 Q52 66 56 64" fill="none" stroke="#d8c088" stroke-width="2"/>
  <!-- Tree on right -->
  <line x1="78" y1="72" x2="78" y2="58" stroke="#4a3018" stroke-width="1.2"/>
  <g fill="#3a6a2a">
    <ellipse cx="78" cy="56" rx="7" ry="5"/>
    <ellipse cx="74" cy="60" rx="4" ry="3"/>
    <ellipse cx="82" cy="60" rx="4" ry="3"/>
  </g>
  <!-- Small flowers hint on meadow -->
  <g fill="#fff6d5" opacity="0.8">
    <circle cx="20" cy="72" r="0.8"/>
    <circle cx="34" cy="74" r="0.8"/>
    <circle cx="62" cy="72" r="0.8"/>
    <circle cx="90" cy="74" r="0.8"/>
  </g>
  <!-- Frame highlights -->
  <rect x="0" y="0" width="104" height="2" fill="rgba(255,248,220,0.5)"/>
  <rect x="0" y="0" width="2" height="84" fill="rgba(255,248,220,0.3)"/>
  <rect x="0" y="82" width="104" height="2" fill="rgba(0,0,0,0.3)"/>
  <rect x="102" y="0" width="2" height="84" fill="rgba(0,0,0,0.22)"/>
</svg>
