<svg xmlns="http://www.w3.org/2000/svg" width="130" height="260">
  <defs>
    <linearGradient id="dr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#6a4020"/>
      <stop offset="15%" stop-color="#8a5a30"/>
      <stop offset="50%" stop-color="#a87240"/>
      <stop offset="85%" stop-color="#8a5a30"/>
      <stop offset="100%" stop-color="#6a4020"/>
    </linearGradient>
    <linearGradient id="doorFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#c0a880"/>
      <stop offset="100%" stop-color="#8a7658"/>
    </linearGradient>
    <linearGradient id="panelInset" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#6a3e1c"/>
      <stop offset="50%" stop-color="#8a5a30"/>
      <stop offset="100%" stop-color="#a86e3c"/>
    </linearGradient>
    <radialGradient id="knobSheen" cx="35%" cy="35%" r="60%">
      <stop offset="0%"  stop-color="#fff8dc"/>
      <stop offset="55%" stop-color="#d4b060"/>
      <stop offset="100%" stop-color="#6a4820"/>
    </radialGradient>
    <linearGradient id="readerShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#555"/>
      <stop offset="50%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
  </defs>

  <!-- Outer frame (casing) -->
  <rect x="0" y="0" width="130" height="260" fill="url(#doorFrame)"/>
  <rect x="0" y="0" width="130" height="3" fill="rgba(255,248,220,0.45)"/>
  <rect x="0" y="257" width="130" height="3" fill="rgba(0,0,0,0.25)"/>
  <!-- Inner casing shadow -->
  <rect x="4" y="2" width="122" height="256" fill="#6a583e"/>
  <rect x="6" y="4" width="118" height="252" fill="#8a7658"/>

  <!-- Door surface -->
  <rect x="10" y="5" width="110" height="250" rx="1" fill="url(#dr)"/>
  <!-- Vertical wood grain streaks -->
  <g stroke="rgba(40,20,8,0.18)" stroke-width="0.5" fill="none">
    <line x1="30" y1="8" x2="30" y2="252"/>
    <line x1="50" y1="8" x2="50" y2="252"/>
    <line x1="70" y1="8" x2="70" y2="252"/>
    <line x1="90" y1="8" x2="90" y2="252"/>
    <line x1="108" y1="8" x2="108" y2="252"/>
  </g>
  <!-- Left edge highlight, right edge shadow -->
  <rect x="11" y="6" width="2" height="248" fill="rgba(255,230,180,0.15)"/>
  <rect x="117" y="6" width="2" height="248" fill="rgba(0,0,0,0.25)"/>

  <!-- Upper panel (raised with bevel) -->
  <rect x="22" y="16" width="86" height="75" rx="3" fill="#6a3e1c" stroke="#4a2a12" stroke-width="1.2"/>
  <rect x="25" y="19" width="80" height="69" rx="2" fill="url(#panelInset)"/>
  <rect x="28" y="22" width="74" height="63" rx="1.5" fill="none" stroke="rgba(255,220,170,0.2)" stroke-width="0.6"/>
  <!-- Panel inner diamond ornament -->
  <path d="M65 32 L88 54 L65 76 L42 54 Z" fill="none" stroke="rgba(60,30,10,0.45)" stroke-width="0.6"/>
  <path d="M65 40 L80 54 L65 68 L50 54 Z" fill="none" stroke="rgba(255,220,170,0.18)" stroke-width="0.5"/>

  <!-- Middle panel -->
  <rect x="22" y="100" width="86" height="70" rx="3" fill="#6a3e1c" stroke="#4a2a12" stroke-width="1.2"/>
  <rect x="25" y="103" width="80" height="64" rx="2" fill="url(#panelInset)"/>
  <rect x="28" y="106" width="74" height="58" rx="1.5" fill="none" stroke="rgba(255,220,170,0.2)" stroke-width="0.6"/>
  <path d="M65 114 L88 135 L65 156 L42 135 Z" fill="none" stroke="rgba(60,30,10,0.45)" stroke-width="0.6"/>
  <path d="M65 122 L80 135 L65 148 L50 135 Z" fill="none" stroke="rgba(255,220,170,0.18)" stroke-width="0.5"/>

  <!-- Lower panel -->
  <rect x="22" y="180" width="86" height="60" rx="3" fill="#6a3e1c" stroke="#4a2a12" stroke-width="1.2"/>
  <rect x="25" y="183" width="80" height="54" rx="2" fill="url(#panelInset)"/>
  <rect x="28" y="186" width="74" height="48" rx="1.5" fill="none" stroke="rgba(255,220,170,0.2)" stroke-width="0.6"/>
  <path d="M65 192 L88 210 L65 228 L42 210 Z" fill="none" stroke="rgba(60,30,10,0.45)" stroke-width="0.6"/>

  <!-- Brass handle escutcheon plate -->
  <rect x="88" y="132" width="26" height="30" rx="4" fill="url(#knobSheen)" stroke="#6a4820" stroke-width="0.8"/>
  <!-- Round brass knob -->
  <circle cx="101" cy="147" r="7" fill="url(#knobSheen)" stroke="#6a4820" stroke-width="0.8"/>
  <circle cx="99" cy="145" r="2" fill="#fff8dc" opacity="0.75"/>
  <!-- Keyhole -->
  <ellipse cx="101" cy="156" rx="1.3" ry="1.8" fill="#1a1a1a"/>
  <rect x="100.4" y="156" width="1.2" height="3" fill="#1a1a1a"/>

  <!-- Card reader (mounted above knob) -->
  <rect x="88" y="104" width="24" height="22" rx="3" fill="url(#readerShine)" stroke="#666" stroke-width="0.8"/>
  <rect x="91" y="107" width="18" height="5" rx="1" fill="#0a0a0a"/>
  <rect x="93" y="108.5" width="14" height="2" rx="0.5" fill="#1a2a1a" opacity="0.8"/>
  <!-- Card slot -->
  <rect x="92" y="115" width="16" height="2.5" rx="0.5" fill="#000" stroke="#666" stroke-width="0.3"/>
  <!-- LED (red) with glow -->
  <circle cx="100" cy="122" r="3.5" fill="rgba(220,40,40,0.3)"/>
  <circle cx="100" cy="122" r="2" fill="#c00"/>
  <circle cx="100" cy="122" r="0.8" fill="#ffd0d0"/>

  <!-- Door edge highlight and shadow -->
  <line x1="10" y1="5" x2="10" y2="255" stroke="rgba(0,0,0,0.3)" stroke-width="1.5"/>
  <line x1="120" y1="5" x2="120" y2="255" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
  <!-- Threshold at bottom -->
  <rect x="10" y="250" width="110" height="5" fill="#4a2a12"/>
  <rect x="10" y="250" width="110" height="1" fill="rgba(255,220,170,0.2)"/>
</svg>
