<svg xmlns="http://www.w3.org/2000/svg" width="110" height="90">
  <defs>
    <linearGradient id="frameGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#d8b870"/>
      <stop offset="50%" stop-color="#a88236"/>
      <stop offset="100%" stop-color="#705416"/>
    </linearGradient>
    <linearGradient id="nightSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1a1e3a"/>
      <stop offset="60%" stop-color="#2a2040"/>
      <stop offset="100%" stop-color="#3a2a4a"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#fff6d5" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#fff6d5" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#fff6d5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nightHills" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f1a2e"/>
      <stop offset="100%" stop-color="#100d1a"/>
    </linearGradient>
  </defs>
  <!-- Frame drop shadow on wall -->
  <rect x="4" y="4" width="104" height="84" rx="2" fill="rgba(0,0,0,0.28)"/>
  <!-- Outer gold frame -->
  <rect x="0" y="0" width="104" height="84" rx="2" fill="url(#frameGold)"/>
  <!-- Inner bevel -->
  <rect x="3" y="3" width="98" height="78" fill="#604010"/>
  <!-- Canvas sky -->
  <rect x="6" y="6" width="92" height="72" fill="url(#nightSky)"/>
  <!-- Stars -->
  <g fill="#fff6d5">
    <circle cx="16" cy="14" r="0.6" opacity="0.9"/>
    <circle cx="28" cy="10" r="0.5" opacity="0.7"/>
    <circle cx="44" cy="16" r="0.5" opacity="0.8"/>
    <circle cx="78" cy="12" r="0.6" opacity="0.9"/>
    <circle cx="86" cy="20" r="0.4" opacity="0.6"/>
    <circle cx="22" cy="24" r="0.4" opacity="0.5"/>
    <circle cx="60" cy="10" r="0.5" opacity="0.8"/>
    <circle cx="92" cy="28" r="0.4" opacity="0.5"/>
  </g>
  <!-- Moon glow -->
  <circle cx="74" cy="22" r="14" fill="url(#moonGlow)"/>
  <circle cx="74" cy="22" r="6" fill="#f8ecb8"/>
  <circle cx="72" cy="20" r="4.5" fill="#fff6d5" opacity="0.9"/>
  <!-- Distant hills -->
  <path d="M6 58 L22 46 L34 52 L50 42 L66 50 L80 44 L98 50 L98 78 L6 78 Z" fill="url(#nightHills)"/>
  <!-- Foreground hill -->
  <path d="M6 70 L34 62 L58 66 L80 60 L98 64 L98 78 L6 78 Z" fill="#0d0a14"/>
  <!-- Lone tree silhouette -->
  <line x1="28" y1="68" x2="28" y2="46" stroke="#0d0a14" stroke-width="1.5"/>
  <g fill="#0d0a14">
    <ellipse cx="28" cy="44" rx="8" ry="5"/>
    <ellipse cx="24" cy="48" rx="4" ry="3"/>
    <ellipse cx="33" cy="48" rx="4" ry="3"/>
  </g>
  <!-- Moon reflection on hill -->
  <ellipse cx="74" cy="64" rx="8" ry="1.5" fill="#f8ecb8" opacity="0.35"/>
  <!-- Frame highlights -->
  <rect x="0" y="0" width="104" height="2" fill="rgba(255,245,210,0.35)"/>
  <rect x="0" y="0" width="2" height="84" fill="rgba(255,245,210,0.2)"/>
  <rect x="0" y="82" width="104" height="2" fill="rgba(0,0,0,0.35)"/>
  <rect x="102" y="0" width="2" height="84" fill="rgba(0,0,0,0.25)"/>
</svg>
