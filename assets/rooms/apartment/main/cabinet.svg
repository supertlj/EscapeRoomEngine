<svg xmlns="http://www.w3.org/2000/svg" width="145" height="200">
  <defs>
    <linearGradient id="cabf" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#a07a38"/>
      <stop offset="20%" stop-color="#c8a060"/>
      <stop offset="55%" stop-color="#d8b272"/>
      <stop offset="85%" stop-color="#b88c48"/>
      <stop offset="100%" stop-color="#8a6628"/>
    </linearGradient>
    <linearGradient id="cabs" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#a88040"/>
      <stop offset="100%" stop-color="#6a4820"/>
    </linearGradient>
    <linearGradient id="cabDoor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#c8a060"/>
      <stop offset="100%" stop-color="#a07838"/>
    </linearGradient>
    <linearGradient id="glassPane" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="rgba(200,220,230,0.25)"/>
      <stop offset="50%" stop-color="rgba(140,160,180,0.08)"/>
      <stop offset="100%" stop-color="rgba(60,80,100,0.15)"/>
    </linearGradient>
    <radialGradient id="brassKnob" cx="35%" cy="35%" r="65%">
      <stop offset="0%"  stop-color="#fff4c8"/>
      <stop offset="55%" stop-color="#c89030"/>
      <stop offset="100%" stop-color="#6a4818"/>
    </radialGradient>
  </defs>

  <!-- Floor shadow -->
  <ellipse cx="68" cy="196" rx="60" ry="5" fill="rgba(0,0,0,0.22)"/>

  <!-- Side panel (3D depth) -->
  <polygon points="125,2 140,8 140,192 125,198" fill="url(#cabs)"/>
  <!-- Side panel shadow line -->
  <line x1="125" y1="2" x2="125" y2="198" stroke="rgba(0,0,0,0.25)" stroke-width="0.8"/>

  <!-- Front face frame -->
  <rect x="2" y="2" width="123" height="196" rx="2" fill="url(#cabf)" stroke="#6a4820" stroke-width="1"/>
  <!-- Top cornice -->
  <rect x="0" y="0" width="127" height="6" fill="#8a6628"/>
  <rect x="0" y="0" width="127" height="2" fill="#d4b472"/>

  <!-- Upper glass doors — wooden frames -->
  <rect x="8" y="10" width="55" height="78" rx="2" fill="url(#cabDoor)" stroke="#6a4820" stroke-width="1.2"/>
  <rect x="67" y="10" width="55" height="78" rx="2" fill="url(#cabDoor)" stroke="#6a4820" stroke-width="1.2"/>
  <!-- Glass panes — dark interior -->
  <rect x="12" y="14" width="47" height="70" fill="#151310" rx="1"/>
  <rect x="71" y="14" width="47" height="70" fill="#151310" rx="1"/>
  <!-- Faint shelf hint inside -->
  <line x1="12" y1="44" x2="59" y2="44" stroke="rgba(120,90,60,0.35)" stroke-width="0.8"/>
  <line x1="71" y1="44" x2="118" y2="44" stroke="rgba(120,90,60,0.35)" stroke-width="0.8"/>
  <!-- Glass tint + reflection -->
  <rect x="12" y="14" width="47" height="70" fill="url(#glassPane)" rx="1"/>
  <rect x="71" y="14" width="47" height="70" fill="url(#glassPane)" rx="1"/>
  <!-- Glass diagonal shine -->
  <path d="M14 78 L30 16" stroke="rgba(255,255,255,0.22)" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M73 78 L89 16" stroke="rgba(255,255,255,0.18)" stroke-width="1.5" fill="none" opacity="0.7"/>
  <!-- Muntin cross (decorative window bars) -->
  <line x1="35" y1="14" x2="35" y2="84" stroke="#6a4820" stroke-width="1"/>
  <line x1="12" y1="49" x2="59" y2="49" stroke="#6a4820" stroke-width="0.8"/>
  <line x1="94" y1="14" x2="94" y2="84" stroke="#6a4820" stroke-width="1"/>
  <line x1="71" y1="49" x2="118" y2="49" stroke="#6a4820" stroke-width="0.8"/>
  <!-- Glass door brass pulls -->
  <rect x="55" y="42" width="3" height="12" rx="1.2" fill="url(#brassKnob)"/>
  <rect x="69" y="42" width="3" height="12" rx="1.2" fill="url(#brassKnob)"/>

  <!-- Middle shelf divider (decorative) -->
  <rect x="4" y="90" width="119" height="10" fill="#8a6628"/>
  <rect x="4" y="90" width="119" height="2" fill="rgba(255,240,200,0.3)"/>
  <rect x="4" y="98" width="119" height="2" fill="rgba(0,0,0,0.25)"/>
  <!-- Decorative trim -->
  <rect x="18" y="93" width="8" height="4" rx="1" fill="#6a4820"/>
  <rect x="40" y="93" width="45" height="4" rx="1" fill="#6a4820"/>
  <rect x="99" y="93" width="8" height="4" rx="1" fill="#6a4820"/>
  <circle cx="32" cy="95" r="1.2" fill="url(#brassKnob)"/>
  <circle cx="93" cy="95" r="1.2" fill="url(#brassKnob)"/>

  <!-- Lower doors -->
  <rect x="8" y="104" width="55" height="88" rx="2" fill="url(#cabDoor)" stroke="#6a4820" stroke-width="1.2"/>
  <rect x="67" y="104" width="55" height="88" rx="2" fill="url(#cabDoor)" stroke="#6a4820" stroke-width="1.2"/>
  <!-- Panel insets (raised panels) -->
  <rect x="13" y="109" width="45" height="78" rx="2" fill="#6a4820"/>
  <rect x="15" y="111" width="41" height="74" rx="1.5" fill="url(#cabDoor)" stroke="rgba(255,230,180,0.25)" stroke-width="0.5"/>
  <rect x="72" y="109" width="45" height="78" rx="2" fill="#6a4820"/>
  <rect x="74" y="111" width="41" height="74" rx="1.5" fill="url(#cabDoor)" stroke="rgba(255,230,180,0.25)" stroke-width="0.5"/>

  <!-- Brass knobs -->
  <circle cx="56" cy="148" r="4.5" fill="url(#brassKnob)" stroke="#6a4818" stroke-width="0.6"/>
  <circle cx="54.5" cy="146.5" r="1.2" fill="#fff4c8" opacity="0.85"/>
  <circle cx="72" cy="148" r="4.5" fill="url(#brassKnob)" stroke="#6a4818" stroke-width="0.6"/>
  <circle cx="70.5" cy="146.5" r="1.2" fill="#fff4c8" opacity="0.85"/>

  <!-- Keyhole escutcheon (lower left door) -->
  <rect x="51.5" y="161" width="9" height="12" rx="1.5" fill="url(#brassKnob)" stroke="#6a4818" stroke-width="0.4"/>
  <circle cx="56" cy="165" r="1.8" fill="#1a0f04"/>
  <rect x="55.2" y="165" width="1.6" height="5" fill="#1a0f04"/>

  <!-- Top edge highlight -->
  <line x1="3" y1="6" x2="124" y2="6" stroke="rgba(255,240,200,0.35)" stroke-width="0.6"/>
  <!-- Skirt/base -->
  <rect x="0" y="192" width="127" height="7" fill="#6a4820"/>
  <rect x="0" y="192" width="127" height="1.5" fill="rgba(255,240,200,0.18)"/>
</svg>
