<svg xmlns="http://www.w3.org/2000/svg" width="400" height="350">
  <defs>
    <radialGradient id="lbg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1e1e28"/>
      <stop offset="100%" stop-color="#08080c"/>
    </radialGradient>
    <radialGradient id="scr" cx="50%" cy="45%" r="65%">
      <stop offset="0%"  stop-color="#1a4a8a"/>
      <stop offset="55%" stop-color="#0c2548"/>
      <stop offset="100%" stop-color="#040d20"/>
    </radialGradient>
    <linearGradient id="lcase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a0a0a8"/>
      <stop offset="55%" stop-color="#777"/>
      <stop offset="100%" stop-color="#555"/>
    </linearGradient>
    <linearGradient id="lbezel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#0e0e0e"/>
    </linearGradient>
    <linearGradient id="desksurf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a4228"/>
      <stop offset="100%" stop-color="#4a3220"/>
    </linearGradient>
    <radialGradient id="lockGold" cx="35%" cy="35%" r="65%">
      <stop offset="0%"  stop-color="#fff4c8"/>
      <stop offset="55%" stop-color="#d8a838"/>
      <stop offset="100%" stop-color="#7a4810"/>
    </radialGradient>
    <radialGradient id="screenGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%"  stop-color="rgba(80,160,240,0.35)"/>
      <stop offset="60%" stop-color="rgba(40,90,180,0.10)"/>
      <stop offset="100%" stop-color="rgba(20,40,90,0)"/>
    </radialGradient>
  </defs>

  <rect width="400" height="350" fill="url(#lbg)"/>

  <!-- Desk surface underneath — 3D perspective -->
  <polygon points="0,340 400,340 380,225 20,225" fill="url(#desksurf)" opacity="0.4"/>
  <line x1="20" y1="225" x2="380" y2="225" stroke="#6a5238" stroke-width="0.5" opacity="0.3"/>

  <!-- Strong screen glow on desk + walls -->
  <ellipse cx="200" cy="225" rx="220" ry="80" fill="rgba(60,130,220,0.10)"/>
  <ellipse cx="200" cy="300" rx="150" ry="34" fill="rgba(40,90,170,0.12)"/>

  <!-- Laptop base — 3D perspective trapezoid (foreshortened) -->
  <polygon points="45,232 355,232 340,330 60,330" fill="url(#lcase)" stroke="#444" stroke-width="1.5"/>
  <!-- Base thickness (front edge) -->
  <polygon points="60,330 340,330 343,335 57,335" fill="#444" stroke="#333" stroke-width="0.5"/>
  <!-- Subtle brand emboss on palmrest -->
  <ellipse cx="200" cy="320" rx="14" ry="3.5" fill="rgba(255,255,255,0.06)"/>

  <!-- Hinge — 3D cylinder -->
  <rect x="50" y="228" width="300" height="8" rx="3" fill="#777" stroke="#555" stroke-width="0.5"/>
  <rect x="52" y="229" width="296" height="3" fill="rgba(255,255,255,0.12)" rx="1"/>
  <line x1="52" y1="234" x2="348" y2="234" stroke="rgba(0,0,0,0.3)" stroke-width="0.5"/>

  <!-- Keyboard area — 3D recessed -->
  <polygon points="72,245 328,245 318,310 82,310" fill="#3a3a3a" stroke="#2a2a2a" stroke-width="0.5"/>
  <polygon points="72,245 328,245 326,247 74,247" fill="rgba(0,0,0,0.4)"/>

  <!-- Keyboard keys — 3D perspective grid -->
  <g fill="#4a4a4a" stroke="#2a2a2a" stroke-width="0.4">
    <!-- Row 1 -->
    <rect x="78" y="247" width="16" height="9" rx="1"/><rect x="96" y="247" width="16" height="9" rx="1"/>
    <rect x="114" y="247" width="16" height="9" rx="1"/><rect x="132" y="247" width="16" height="9" rx="1"/>
    <rect x="150" y="247" width="16" height="9" rx="1"/><rect x="168" y="247" width="16" height="9" rx="1"/>
    <rect x="186" y="247" width="16" height="9" rx="1"/><rect x="204" y="247" width="16" height="9" rx="1"/>
    <rect x="222" y="247" width="16" height="9" rx="1"/><rect x="240" y="247" width="16" height="9" rx="1"/>
    <rect x="258" y="247" width="16" height="9" rx="1"/><rect x="276" y="247" width="16" height="9" rx="1"/>
    <rect x="294" y="247" width="18" height="9" rx="1"/>
    <!-- Row 2 -->
    <rect x="80" y="258" width="19" height="9" rx="1"/><rect x="101" y="258" width="15" height="9" rx="1"/>
    <rect x="118" y="258" width="15" height="9" rx="1"/><rect x="135" y="258" width="15" height="9" rx="1"/>
    <rect x="152" y="258" width="15" height="9" rx="1"/><rect x="169" y="258" width="15" height="9" rx="1"/>
    <rect x="186" y="258" width="15" height="9" rx="1"/><rect x="203" y="258" width="15" height="9" rx="1"/>
    <rect x="220" y="258" width="15" height="9" rx="1"/><rect x="237" y="258" width="15" height="9" rx="1"/>
    <rect x="254" y="258" width="15" height="9" rx="1"/><rect x="271" y="258" width="32" height="9" rx="1"/>
    <!-- Row 3 -->
    <rect x="82" y="269" width="22" height="9" rx="1"/><rect x="106" y="269" width="14" height="9" rx="1"/>
    <rect x="122" y="269" width="14" height="9" rx="1"/><rect x="138" y="269" width="14" height="9" rx="1"/>
    <rect x="154" y="269" width="14" height="9" rx="1"/><rect x="170" y="269" width="14" height="9" rx="1"/>
    <rect x="186" y="269" width="14" height="9" rx="1"/><rect x="202" y="269" width="14" height="9" rx="1"/>
    <rect x="218" y="269" width="14" height="9" rx="1"/><rect x="234" y="269" width="60" height="9" rx="1"/>
    <!-- Space bar -->
    <rect x="128" y="280" width="130" height="9" rx="1"/>
  </g>
  <!-- Key top highlights -->
  <g fill="rgba(255,255,255,0.05)">
    <rect x="78" y="247" width="16" height="2.5" rx="1"/><rect x="114" y="247" width="16" height="2.5" rx="1"/>
    <rect x="150" y="247" width="16" height="2.5" rx="1"/><rect x="186" y="247" width="16" height="2.5" rx="1"/>
    <rect x="222" y="247" width="16" height="2.5" rx="1"/><rect x="258" y="247" width="16" height="2.5" rx="1"/>
    <rect x="128" y="280" width="130" height="2.5" rx="1"/>
  </g>
  <!-- Subtle blue keyboard backlight glow -->
  <rect x="72" y="245" width="256" height="65" fill="rgba(60,130,220,0.04)"/>

  <!-- Trackpad — 3D recessed -->
  <rect x="148" y="296" width="96" height="12" rx="3" fill="#5a5a5a" stroke="#444" stroke-width="0.5"/>
  <rect x="150" y="297" width="92" height="3.5" fill="rgba(255,255,255,0.08)" rx="2"/>
  <rect x="148" y="306" width="96" height="2" fill="rgba(0,0,0,0.3)" rx="1"/>

  <!-- Screen lid — 3D with bezel -->
  <polygon points="42,28 358,28 355,225 45,225" fill="url(#lbezel)" stroke="#222" stroke-width="2"/>
  <!-- Screen bezel top thickness -->
  <polygon points="42,28 358,28 362,24 38,24" fill="#1a1a1a" stroke="#333" stroke-width="0.5"/>
  <!-- Screen bezel side highlights -->
  <line x1="44" y1="30" x2="44" y2="222" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="356" y1="30" x2="356" y2="222" stroke="rgba(0,0,0,0.5)" stroke-width="1"/>

  <!-- Screen panel -->
  <rect x="56" y="40" width="288" height="178" rx="3" fill="url(#scr)"/>
  <!-- Screen radial glow halo -->
  <rect x="56" y="40" width="288" height="178" rx="3" fill="url(#screenGlow)"/>
  <!-- Bright glow edge -->
  <rect x="56" y="40" width="288" height="178" rx="3" fill="none" stroke="rgba(120,180,240,0.25)" stroke-width="1.2"/>

  <!-- Camera dot -->
  <circle cx="200" cy="33" r="2.5" fill="#222" stroke="#3a3a3a" stroke-width="0.5"/>
  <circle cx="200" cy="33" r="1" fill="#0a0a0a"/>

  <!-- Gold lock icon at top of screen content -->
  <g transform="translate(200 72)">
    <!-- Shackle -->
    <path d="M-10,0 Q-10,-12 0,-12 Q10,-12 10,0" fill="none" stroke="url(#lockGold)" stroke-width="3.5"/>
    <path d="M-7,0 Q-7,-9 0,-9 Q7,-9 7,0" fill="none" stroke="rgba(120,80,20,0.6)" stroke-width="1.2"/>
    <!-- Body -->
    <rect x="-13" y="-2" width="26" height="20" rx="3" fill="url(#lockGold)" stroke="#7a4810" stroke-width="0.8"/>
    <!-- Highlight -->
    <rect x="-11" y="0" width="22" height="4" rx="2" fill="rgba(255,248,200,0.5)"/>
    <!-- Keyhole -->
    <circle cx="0" cy="6" r="2.2" fill="#3a2008"/>
    <rect x="-0.8" y="6" width="1.6" height="6" fill="#3a2008"/>
  </g>

  <!-- LOCKED label -->
  <text x="200" y="106" text-anchor="middle" fill="#d8a838" font-size="13" font-weight="bold" font-family="monospace" letter-spacing="3">LOCKED</text>

  <!-- Password prompt panel -->
  <rect x="100" y="120" width="200" height="78" rx="6" fill="rgba(20,40,80,0.5)" stroke="rgba(120,180,240,0.3)" stroke-width="1"/>
  <text x="200" y="139" text-anchor="middle" fill="#9ac4f0" font-size="11" font-family="monospace">Enter Password</text>
  <rect x="125" y="148" width="150" height="24" rx="4" fill="#0a1828" stroke="#3a5a8a" stroke-width="1"/>
  <text x="200" y="166" text-anchor="middle" fill="#5a7aa8" font-size="14" font-family="monospace" letter-spacing="6">_ _ _ _</text>
  <rect x="160" y="178" width="80" height="16" rx="3" fill="#2a4a78" stroke="#5a8ac8" stroke-width="0.5"/>
  <text x="200" y="190" text-anchor="middle" fill="#cfe4ff" font-size="9" font-weight="bold" font-family="monospace">SUBMIT</text>

  <!-- Screen reflection diagonal -->
  <path d="M60 215 L160 50" stroke="rgba(255,255,255,0.04)" stroke-width="22" fill="none"/>
</svg>
