<svg xmlns="http://www.w3.org/2000/svg" width="400" height="450">
  <defs>
    <radialGradient id="zcab" cx="50%" cy="40%" r="70%">
      <stop offset="0%"  stop-color="#1e1810"/>
      <stop offset="100%" stop-color="#0a0805"/>
    </radialGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#a07838"/>
      <stop offset="20%"  stop-color="#c8a060"/>
      <stop offset="55%"  stop-color="#d8b272"/>
      <stop offset="85%"  stop-color="#b88c48"/>
      <stop offset="100%" stop-color="#8a6628"/>
    </linearGradient>
    <linearGradient id="woodside" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#8a6828"/>
      <stop offset="100%" stop-color="#5a3e18"/>
    </linearGradient>
    <linearGradient id="woodtop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#e0b878"/>
      <stop offset="100%" stop-color="#a87838"/>
    </linearGradient>
    <linearGradient id="cabDoor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#c8a060"/>
      <stop offset="100%" stop-color="#a07838"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="rgba(200,220,230,0.2)"/>
      <stop offset="50%" stop-color="rgba(140,160,180,0.06)"/>
      <stop offset="100%" stop-color="rgba(60,80,100,0.12)"/>
    </linearGradient>
    <radialGradient id="brassKnob" cx="35%" cy="35%" r="65%">
      <stop offset="0%"  stop-color="#fff4c8"/>
      <stop offset="55%" stop-color="#c89030"/>
      <stop offset="100%" stop-color="#6a4818"/>
    </radialGradient>
  </defs>

  <rect width="400" height="450" fill="url(#zcab)"/>
  <!-- Ambient warm wash from above-left -->
  <ellipse cx="160" cy="80" rx="240" ry="140" fill="rgba(255,228,170,0.06)"/>

  <!-- 3D side and top -->
  <polygon points="370,20 395,10 395,440 370,430" fill="url(#woodside)" stroke="#5a3e18" stroke-width="1"/>
  <polygon points="30,20 370,20 395,10 55,10" fill="url(#woodtop)" stroke="#a07838" stroke-width="0.5"/>
  <!-- Top cornice highlight -->
  <line x1="55" y1="10" x2="395" y2="10" stroke="rgba(255,240,200,0.5)" stroke-width="0.8"/>

  <!-- Front face -->
  <rect x="30" y="20" width="340" height="410" rx="2" fill="url(#wood)" stroke="#6a4820" stroke-width="2"/>
  <!-- Top cornice band -->
  <rect x="30" y="20" width="340" height="14" fill="#8a6628"/>
  <rect x="30" y="20" width="340" height="3" fill="#d4b472"/>

  <!-- Wood grain lines -->
  <g stroke="#7a5a28" stroke-width="0.4" opacity="0.35">
    <line x1="35" y1="55" x2="365" y2="55"/>
    <line x1="35" y1="135" x2="365" y2="135"/>
    <line x1="35" y1="285" x2="365" y2="285"/>
    <line x1="35" y1="385" x2="365" y2="385"/>
  </g>

  <!-- ===== UPPER GLASS DOORS ===== -->
  <rect x="40" y="40" width="155" height="170" rx="3" fill="url(#cabDoor)" stroke="#6a4820" stroke-width="2.5"/>
  <rect x="205" y="40" width="155" height="170" rx="3" fill="url(#cabDoor)" stroke="#6a4820" stroke-width="2.5"/>
  <!-- Glass panes (dark interior) -->
  <rect x="48" y="48" width="139" height="154" fill="#151310" rx="2"/>
  <rect x="213" y="48" width="139" height="154" fill="#151310" rx="2"/>
  <!-- Faint shelf hint inside -->
  <line x1="48" y1="115" x2="187" y2="115" stroke="rgba(120,90,60,0.35)" stroke-width="1.5"/>
  <line x1="213" y1="115" x2="352" y2="115" stroke="rgba(120,90,60,0.35)" stroke-width="1.5"/>
  <!-- Glass tint -->
  <rect x="48" y="48" width="139" height="154" fill="url(#glass)" rx="2"/>
  <rect x="213" y="48" width="139" height="154" fill="url(#glass)" rx="2"/>
  <!-- Diagonal glass shine -->
  <path d="M55 195 L130 55" stroke="rgba(255,255,255,0.22)" stroke-width="6" fill="none" opacity="0.7"/>
  <path d="M220 195 L295 55" stroke="rgba(255,255,255,0.18)" stroke-width="5" fill="none" opacity="0.7"/>
  <!-- Muntin cross bars (decorative window bars) on each door -->
  <g stroke="#6a4820" stroke-width="2.5">
    <line x1="117" y1="48" x2="117" y2="202"/>
    <line x1="48" y1="125" x2="187" y2="125"/>
    <line x1="282" y1="48" x2="282" y2="202"/>
    <line x1="213" y1="125" x2="352" y2="125"/>
  </g>
  <!-- Glass door brass pulls (vertical) -->
  <rect x="178" y="115" width="6" height="22" rx="2" fill="url(#brassKnob)" stroke="#6a4818" stroke-width="0.5"/>
  <rect x="216" y="115" width="6" height="22" rx="2" fill="url(#brassKnob)" stroke="#6a4818" stroke-width="0.5"/>

  <!-- ===== DIVIDER SHELF (3D thickness) ===== -->
  <rect x="35" y="220" width="330" height="4" fill="rgba(0,0,0,0.25)"/>
  <rect x="35" y="212" width="330" height="12" rx="1" fill="#8a6628" stroke="#5a3e18" stroke-width="0.5"/>
  <rect x="35" y="212" width="330" height="3" fill="#d4b472"/>
  <rect x="35" y="221" width="330" height="2" fill="rgba(0,0,0,0.25)"/>
  <!-- Decorative trim on divider -->
  <rect x="80" y="215" width="20" height="6" rx="1" fill="#6a4820"/>
  <rect x="170" y="215" width="60" height="6" rx="1" fill="#6a4820"/>
  <rect x="300" y="215" width="20" height="6" rx="1" fill="#6a4820"/>
  <circle cx="125" cy="218" r="2" fill="url(#brassKnob)"/>
  <circle cx="275" cy="218" r="2" fill="url(#brassKnob)"/>

  <!-- ===== LOWER DOORS (raised panels) ===== -->
  <rect x="40" y="232" width="155" height="195" rx="3" fill="url(#cabDoor)" stroke="#6a4820" stroke-width="2.5"/>
  <rect x="205" y="232" width="155" height="195" rx="3" fill="url(#cabDoor)" stroke="#6a4820" stroke-width="2.5"/>
  <!-- Raised panel insets (LEFT) -->
  <rect x="55" y="248" width="125" height="163" rx="3" fill="#6a4820"/>
  <rect x="59" y="252" width="117" height="155" rx="2" fill="url(#cabDoor)" stroke="rgba(255,230,180,0.3)" stroke-width="0.7"/>
  <!-- Bevel highlight/shadow -->
  <line x1="59" y1="252" x2="176" y2="252" stroke="rgba(255,240,200,0.45)" stroke-width="1.2"/>
  <line x1="59" y1="252" x2="59" y2="407" stroke="rgba(255,240,200,0.3)" stroke-width="1"/>
  <line x1="176" y1="252" x2="176" y2="407" stroke="rgba(0,0,0,0.3)" stroke-width="1.2"/>
  <line x1="59" y1="407" x2="176" y2="407" stroke="rgba(0,0,0,0.3)" stroke-width="1.2"/>
  <!-- Raised panel insets (RIGHT) -->
  <rect x="220" y="248" width="125" height="163" rx="3" fill="#6a4820"/>
  <rect x="224" y="252" width="117" height="155" rx="2" fill="url(#cabDoor)" stroke="rgba(255,230,180,0.3)" stroke-width="0.7"/>
  <line x1="224" y1="252" x2="341" y2="252" stroke="rgba(255,240,200,0.45)" stroke-width="1.2"/>
  <line x1="224" y1="252" x2="224" y2="407" stroke="rgba(255,240,200,0.3)" stroke-width="1"/>
  <line x1="341" y1="252" x2="341" y2="407" stroke="rgba(0,0,0,0.3)" stroke-width="1.2"/>
  <line x1="224" y1="407" x2="341" y2="407" stroke="rgba(0,0,0,0.3)" stroke-width="1.2"/>

  <!-- Brass door knobs -->
  <circle cx="183" cy="325" r="9" fill="url(#brassKnob)" stroke="#6a4818" stroke-width="1"/>
  <circle cx="180" cy="322" r="3" fill="#fff4c8" opacity="0.85"/>
  <circle cx="217" cy="325" r="9" fill="url(#brassKnob)" stroke="#6a4818" stroke-width="1"/>
  <circle cx="214" cy="322" r="3" fill="#fff4c8" opacity="0.85"/>

  <!-- Brass escutcheon plate with keyhole (lower-LEFT door) -->
  <rect x="174" y="350" width="18" height="22" rx="2.5" fill="url(#brassKnob)" stroke="#6a4818" stroke-width="0.7"/>
  <ellipse cx="183" cy="358" rx="3" ry="3.5" fill="#1a0f04"/>
  <rect x="181.5" y="358" width="3" height="9" fill="#1a0f04"/>

  <!-- Bottom skirt/base -->
  <rect x="30" y="425" width="340" height="10" fill="#6a4820"/>
  <rect x="30" y="425" width="340" height="2" fill="rgba(255,240,200,0.25)"/>
  <!-- Floor shadow -->
  <ellipse cx="200" cy="438" rx="180" ry="6" fill="rgba(0,0,0,0.35)"/>
</svg>
