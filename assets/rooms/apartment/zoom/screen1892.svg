<svg xmlns="http://www.w3.org/2000/svg" width="280" height="175">
  <defs>
    <radialGradient id="scrglow" cx="50%" cy="50%" r="65%">
      <stop offset="0%"  stop-color="#0e3028"/>
      <stop offset="60%" stop-color="#08201c"/>
      <stop offset="100%" stop-color="#040c0a"/>
    </radialGradient>
    <radialGradient id="numglow" cx="50%" cy="50%" r="55%">
      <stop offset="0%"  stop-color="rgba(80,255,150,0.22)"/>
      <stop offset="60%" stop-color="rgba(40,200,120,0.06)"/>
      <stop offset="100%" stop-color="rgba(0,120,60,0)"/>
    </radialGradient>
    <radialGradient id="unlockGold" cx="35%" cy="35%" r="65%">
      <stop offset="0%"  stop-color="#fff4c8"/>
      <stop offset="55%" stop-color="#d8a838"/>
      <stop offset="100%" stop-color="#7a4810"/>
    </radialGradient>
  </defs>

  <rect width="280" height="175" rx="2" fill="url(#scrglow)"/>

  <!-- Scanline overlay -->
  <g opacity="0.05">
    <line x1="0" y1="12" x2="280" y2="12" stroke="#5fa" stroke-width="1"/>
    <line x1="0" y1="26" x2="280" y2="26" stroke="#5fa" stroke-width="1"/>
    <line x1="0" y1="40" x2="280" y2="40" stroke="#5fa" stroke-width="1"/>
    <line x1="0" y1="54" x2="280" y2="54" stroke="#5fa" stroke-width="1"/>
    <line x1="0" y1="68" x2="280" y2="68" stroke="#5fa" stroke-width="1"/>
    <line x1="0" y1="82" x2="280" y2="82" stroke="#5fa" stroke-width="1"/>
    <line x1="0" y1="96" x2="280" y2="96" stroke="#5fa" stroke-width="1"/>
    <line x1="0" y1="110" x2="280" y2="110" stroke="#5fa" stroke-width="1"/>
    <line x1="0" y1="124" x2="280" y2="124" stroke="#5fa" stroke-width="1"/>
    <line x1="0" y1="138" x2="280" y2="138" stroke="#5fa" stroke-width="1"/>
    <line x1="0" y1="152" x2="280" y2="152" stroke="#5fa" stroke-width="1"/>
    <line x1="0" y1="166" x2="280" y2="166" stroke="#5fa" stroke-width="1"/>
  </g>

  <!-- Open padlock icon (gold) -->
  <g transform="translate(56 30)">
    <!-- Open shackle (one side detached) -->
    <path d="M-8,0 Q-8,-10 1,-10 Q9,-10 10,-3" fill="none" stroke="url(#unlockGold)" stroke-width="2.6"/>
    <!-- Lock body -->
    <rect x="-10" y="-1" width="20" height="15" rx="2.5" fill="url(#unlockGold)" stroke="#7a4810" stroke-width="0.6"/>
    <rect x="-9" y="0" width="18" height="3" rx="1.5" fill="rgba(255,248,200,0.55)"/>
    <circle cx="0" cy="6" r="1.6" fill="#3a2008"/>
    <rect x="-0.6" y="6" width="1.2" height="4" fill="#3a2008"/>
  </g>

  <!-- Access granted badge -->
  <rect x="76" y="18" width="160" height="26" rx="4" fill="rgba(80,255,150,0.08)" stroke="rgba(80,255,150,0.35)" stroke-width="1"/>
  <text x="156" y="36" text-anchor="middle" fill="#7fdca0" font-size="13" font-family="monospace" font-weight="bold" letter-spacing="2">ACCESS GRANTED</text>

  <!-- Glow halo behind number -->
  <ellipse cx="140" cy="100" rx="120" ry="48" fill="url(#numglow)"/>

  <!-- Number display — terminal frame -->
  <rect x="35" y="58" width="210" height="84" rx="8" fill="rgba(0,40,20,0.4)" stroke="rgba(80,255,150,0.35)" stroke-width="1.5"/>
  <rect x="40" y="63" width="200" height="74" rx="6" fill="none" stroke="rgba(80,255,150,0.15)" stroke-width="1"/>
  <!-- Corner brackets -->
  <g stroke="rgba(120,255,170,0.6)" stroke-width="1.5" fill="none">
    <path d="M44,68 L44,76 M44,68 L52,68"/>
    <path d="M236,68 L236,76 M236,68 L228,68"/>
    <path d="M44,132 L44,124 M44,132 L52,132"/>
    <path d="M236,132 L236,124 M236,132 L228,132"/>
  </g>

  <!-- Big number with glow layers -->
  <text x="140" y="120" text-anchor="middle" fill="rgba(80,255,150,0.18)" font-size="62" font-weight="bold" font-family="monospace" letter-spacing="2">1892</text>
  <text x="140" y="118" text-anchor="middle" fill="rgba(120,255,170,0.5)" font-size="58" font-weight="bold" font-family="monospace" letter-spacing="2">1892</text>
  <text x="140" y="117" text-anchor="middle" fill="#a8ffd0" font-size="56" font-weight="bold" font-family="monospace" letter-spacing="2">1892</text>

  <!-- Status line with blinking cursor -->
  <text x="140" y="160" text-anchor="middle" fill="#5a9a78" font-size="9" font-family="monospace">FILE #0042 — CLASSIFIED</text>
  <rect x="207" y="153" width="5" height="9" fill="#7fdca0" opacity="0.7"/>

  <!-- Diagonal CRT shine -->
  <path d="M20 165 L100 25" stroke="rgba(255,255,255,0.04)" stroke-width="18" fill="none"/>

  <!-- Screen edge vignette -->
  <rect width="280" height="175" rx="2" fill="none" stroke="rgba(0,0,0,0.4)" stroke-width="6"/>
</svg>
